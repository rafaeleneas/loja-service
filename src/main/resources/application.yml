server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    context-path: /api/loja/

keycloak:
  realmExtranet: extranet-realm
  realmIntranet: intranet-realm
  url: ${KEYCLOAK_URL}
  username: loja-backend

servicos:
  pagamento-service: ${PAGAMENTO_SERVICE_URL}

springdoc:
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    oauth:
      clientId: loja-backend
      realm: ${keycloak.realmExtranet}
      appName: loja-backend
      scopeSeparator: " "
      additionalQueryStringParams: {}
      useBasicAuthenticationWithAccessCodeGrant: false
  url: ${SWAGGER_URL}${server.servlet.context-path}

spring:
  config:
    import:
      - "optional:configtree:/var/local/secrets/"
      - "optional:file:.env[.properties]"
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:loja-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.loja.lojaservice.messaging.SolicitacaoPagamentoEvent
        spring.json.trusted.packages: com.loja.lojaservice.messaging
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data.web.pageable.one-indexed-parameters: true
  datasource:
    hikari:
      idleTimeout: 240000
  h2:
    console:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.url}/realms/${keycloak.realmExtranet}
          jwk-set-uri: ${keycloak.url}/realms/${keycloak.realmExtranet}/protocol/openid-connect/certs

management:
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  endpoints:
    enabled-by-default: true
    web:
      exposure:
        include: "metrics, health, info, prometheus"

logging:
  file:
    name: logs/loja-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

app:
  integrations:
    pagamento:
      enabled: false
  messaging:
    topics:
      solicitacao-pagamento: ${KAFKA_TOPIC_SOLICITACAO_PAGAMENTO:pagamento.solicitado.topic}
