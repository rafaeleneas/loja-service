name: Loja Service CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: loja-backend/hgm/backend
  INFRA_REPOSITORY: rafaeleneas/loja-infra # Update with your infrastructure repository name (owner/repo)

permissions:
  contents: read
  id-token: write

jobs:
  build-publish-and-notify:
    name: Build, Publish, and Notify GitOps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application artifact
        run: mvn -B clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        id: publish-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Notify infrastructure repository
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPOSITORY_DISPATCH_TOKEN }}
          IMAGE_URI: ${{ steps.publish-image.outputs.image_uri }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          curl --fail --request POST \
            --url "https://api.github.com/repos/${{ env.INFRA_REPOSITORY }}/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --data "{\"event_type\":\"loja-service-image-published\",\"client_payload\":{\"sha\":\"$COMMIT_SHA\",\"ref\":\"$GIT_REF\",\"image\":\"$IMAGE_URI\"}}"
