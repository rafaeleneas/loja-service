name: Loja Service CI

on:
  push:
    branches:
      - main
      - hmg

concurrency:
  group: backend-ci-${{ github.ref_name == 'main' && 'prd' || github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  DEPLOY_ENV: ${{ github.ref_name == 'main' && 'prd' || github.ref_name }}
  INFRA_REPOSITORY: rafaeleneas/loja-infra # Update with your infrastructure repository name (owner/repo)

permissions:
  contents: read
  id-token: write

jobs:
  build-publish-and-notify:
    name: Build, Publish, and Notify GitOps
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prd' || github.ref_name }}

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Validate deployment target
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          case "${DEPLOY_ENV}:${GITHUB_REF_NAME}" in
            hmg:hmg|prd:main)
              ;;
            *)
              echo "::error::Environment ${DEPLOY_ENV} must be deployed from its matching branch."
              echo "::error::Use branch hmg for hmg and branch main for prd. Current branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

          if [ -z "${ECR_REPOSITORY}" ]; then
            echo "::error::GitHub Environment variable ECR_REPOSITORY is not configured for ${DEPLOY_ENV}."
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application artifact
        run: mvn -B clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        id: publish-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Notify infrastructure repository
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPOSITORY_DISPATCH_TOKEN }}
          IMAGE_URI: ${{ steps.publish-image.outputs.image_uri }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          curl --fail --request POST \
            --url "https://api.github.com/repos/${{ env.INFRA_REPOSITORY }}/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --data "{\"event_type\":\"loja-service-image-published\",\"client_payload\":{\"environment\":\"$DEPLOY_ENV\",\"sha\":\"$COMMIT_SHA\",\"ref\":\"$GIT_REF\",\"image\":\"$IMAGE_URI\"}}"
